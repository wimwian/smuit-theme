name: Release

# master advances only by fast-forward from dev (see .claude/gitflow.md), so a
# push here means a release commit (version already bumped on the release branch
# via `pnpm changeset version`). changeset publish is idempotent — it no-ops when
# the current version is already on npm.
on:
  push:
    branches: [master]

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Node before pnpm — see ci.yml for why.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
      - name: Enable pnpm store cache + npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - name: Build the package
        run: pnpm prepack
      - name: Publish to npm
        run: pnpm exec changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
