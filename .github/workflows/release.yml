name: Release

# master advances only by fast-forward from dev (see .claude/gitflow.md), so a
# push here means a release commit (version already bumped on the release branch
# via `pnpm changeset version`). changeset publish is idempotent — it no-ops when
# the current version is already published.
on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write # publish to GitHub Packages with the built-in GITHUB_TOKEN

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Provision pnpm via corepack — see ci.yml for why action-setup can't be used.
      - run: corepack enable
      - name: Enable pnpm store cache + GitHub Packages auth
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@wimwian'
      - run: pnpm install --frozen-lockfile
      - name: Build the package
        run: pnpm prepack
      - name: Publish to GitHub Packages
        run: pnpm exec changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
